name: QA Automation

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run automation tests
        env:
          HEADLESS: true
        run: mvn clean test

      - name: Upload custom automation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tenforce-custom-report
          path: target/custom-reports/test-case-report.html

      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tenforce-surefire-reports
          path: target/surefire-reports
